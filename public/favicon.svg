<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#fff"/>
  <!-- Globe circle -->
  <circle cx="22" cy="30" r="13" fill="none" stroke="#1a56db" stroke-width="2.5"/>
  <!-- Globe latitude lines -->
  <ellipse cx="22" cy="30" rx="6" ry="13" fill="none" stroke="#1a56db" stroke-width="1.5"/>
  <line x1="9" y1="30" x2="35" y2="30" stroke="#1a56db" stroke-width="1.5"/>
  <!-- Left person (blue) -->
  <circle cx="18" cy="20" r="2.5" fill="#1a56db"/>
  <path d="M14 26 Q18 22 22 26" fill="none" stroke="#1a56db" stroke-width="2" stroke-linecap="round"/>
  <!-- Right person (orange) -->
  <circle cx="26" cy="19" r="2.5" fill="#f97316"/>
  <path d="M22 25 Q26 21 30 25" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Book at bottom -->
  <path d="M10 38 Q22 34 34 38 L34 46 Q22 42 10 46 Z" fill="#1a56db" opacity="0.85"/>
  <!-- Text: onlinestudy in dark, hub in orange -->
  <text x="38" y="28" font-family="Arial,sans-serif" font-size="7" font-weight="900" fill="#1e1b4b">online</text>
  <text x="38" y="37" font-family="Arial,sans-serif" font-size="7" font-weight="900" fill="#f97316">study</text>
  <text x="38" y="46" font-family="Arial,sans-serif" font-size="7" font-weight="900" fill="#1e1b4b">hub</text>
</svg>

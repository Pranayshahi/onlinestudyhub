    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "OnlineStudyHub",
      "url": "https://www.onlinestudyhub.com",
      "description": "India's online tuition platform for Class 6-12, JEE and NEET students",
      "address": { "@type": "PostalAddress", "addressCountry": "IN" },
      "sameAs": ["https://github.com/Pranayshahi/onlinestudyhub"]
    }
    </script>

    <!-- Structured Data: WebSite + Sitelinks Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OnlineStudyHub",
      "url": "https://www.onlinestudyhub.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.onlinestudyhub.com/class/{search_term_string}",
        "query-input": "required name=search_term_string"

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {

      "description": "India's free online tuition platform for Class 6–12, JEE and NEET students. Study CBSE topic-wise notes, find verified teachers, and book 1-on-1 sessions.",
      "address": { "@type": "PostalAddress", "addressCountry": "IN" },
      "areaServed": "IN",
      "foundingDate": "2024",
      "slogan": "India's Free Online Study Hub",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Free CBSE Study Material",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "Class 6–12 CBSE Topic-wise Notes", "isAccessibleForFree": true } },
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "JEE Preparation", "isAccessibleForFree": true } },

        ]

        "https://github.com/Pranayshahi/onlinestudyhub",

    <!-- Structured Data: WebSite + Sitelinks Search -->

    <!-- Performance Optimization: Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --indigo-950: #1e1b4b;
        --indigo-900: #312e81;
        --indigo-800: #3730a3;
        --indigo-700: #4338ca;
        --indigo-600: #4f46e5;
        --indigo-500: #6366f1;
        --indigo-100: #e0e7ff;
        --indigo-50: #eef2ff;
        --orange-500: #f97316;
        --orange-600: #ea580c;
        --orange-50: #fff7ed;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-600: #4b5563;
        --gray-700: #374151;
        --gray-800: #1f2937;
        --gray-900: #111827;
      }
      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f9fafb;
        color: #111827;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Nunito', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.3;
      }
      /* Critical above-fold styles — prevents flash while main CSS loads */
      #root { min-height: 100vh; }
      .app { display: flex; flex-direction: column; min-height: 100vh; }
      nav, .navbar { background: #1e1b4b; position: sticky; top: 0; z-index: 100; min-height: 64px; }
      .nav-inner { display: flex; align-items: center; height: 64px; gap: .25rem; max-width: 1200px; margin: 0 auto; padding: 0 1.25rem; }
      .nav-logo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.4rem; color: #fff; text-decoration: none; }
      .nav-logo span { color: #f97316; }
      .hero { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%); color: #fff; padding: 6rem 0 5rem; position: relative; overflow: hidden; }
      .hero-content { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 1.25rem; }
      .hero h1 { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.15; margin-bottom: 1.25rem; }
      .hero p { font-size: 1.15rem; color: rgba(255,255,255,.75); max-width: 600px; margin-bottom: 2rem; line-height: 1.75; }
      .page-header { background: linear-gradient(135deg, #1e1b4b 0%, #4f46e5 100%); color: #fff; padding: 3rem 0; }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 1.25rem; }
      a { text-decoration: none; color: inherit; }
      button { cursor: pointer; border: none; background: none; font-family: inherit; }
      img { max-width: 100%; }
      * { scroll-behavior: smooth; }
      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 3px; }
    </style>

    <!-- Async CSS Loader: Moves main CSS out of the critical path -->
    <script>
      (function() {
        const loadDeferredStyles = () => {
          const links = document.getElementsByTagName('link');
          for (let i = 0; i < links.length; i++) {
            if (links[i].rel === 'stylesheet' && !links[i].getAttribute('data-critical')) {
              // If we wanted to defer ALL non-critical CSS, we could do it here
              // But CRA auto-injects them. This script will run AFTER they are injected.
            }
          }
        };
        window.addEventListener('load', loadDeferredStyles);
      })();
    </script>

    <div id="root"></div>
  </body>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="20"/>
  <rect x="80" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#ca8a04" stroke-width="2"/>
<text x="105" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#ca8a04">1²=1</text><rect x="135" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#ca8a04" stroke-width="2"/>
<text x="160" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#ca8a04">2²=4</text><rect x="190" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#ca8a04" stroke-width="2"/>
<text x="215" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#ca8a04">3²=9</text><rect x="245" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#ca8a04" stroke-width="2"/>
<text x="270" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#ca8a04">4²=16</text><rect x="300" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#ca8a04" stroke-width="2"/>
<text x="325" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#ca8a04">5²=25</text><rect x="355" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#ca8a04" stroke-width="2"/>
<text x="380" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#ca8a04">6²=36</text><rect x="410" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#a16207" stroke-width="2"/>
<text x="435" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#a16207">7²=49</text><rect x="465" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#a16207" stroke-width="2"/>
<text x="490" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#a16207">8²=64</text><rect x="520" y="90" width="50" height="50" rx="8" fill="#fde047" stroke="#a16207" stroke-width="2"/>
<text x="545" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#a16207">9²=81</text><rect x="575" y="90" width="50" height="50" rx="8" fill="#fbbf24" stroke="#a16207" stroke-width="2"/>
<text x="600" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#a16207">10²=100</text><rect x="630" y="90" width="50" height="50" rx="8" fill="#fbbf24" stroke="#a16207" stroke-width="2"/>
<text x="655" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#a16207">11²=121</text><rect x="685" y="90" width="50" height="50" rx="8" fill="#fbbf24" stroke="#a16207" stroke-width="2"/>
<text x="710" y="120" text-anchor="middle" font-size="15" font-weight="700" font-family="sans-serif" fill="#a16207">12²=144</text>
<rect x="100" y="175" width="600" height="55" rx="12" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
<text x="400" y="210" text-anchor="middle" font-size="19" font-family="monospace" font-weight="700" fill="#92400e">√144 = √(2²×2²×3²) = 2×2×3 = 12</text>
<rect x="150" y="255" width="500" height="48" rx="12" fill="#fbbf24" stroke="#b45309" stroke-width="2"/>
<text x="400" y="284" text-anchor="middle" font-size="17" font-family="sans-serif" font-weight="700" fill="#78350f">Pythagorean triplet: (6, 8, 10)  ∵  36+64=100</text>
<text x="400" y="380" text-anchor="middle" font-size="26" font-family="sans-serif" font-weight="800" fill="#78350f">Squares and Square Roots</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="20"/>
  <!-- Resource types grid -->

<rect x="100" y="100" width="260" height="160" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
<text x="230" y="150" text-anchor="middle" font-size="28" font-family="sans-serif">🌲</text>
<text x="230" y="190" text-anchor="middle" font-size="16" font-weight="800" font-family="sans-serif" fill="#16a34a">Natural Resource</text>
<text x="230" y="218" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Land, Water, Forest</text>
<rect x="420" y="100" width="260" height="160" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
<text x="550" y="150" text-anchor="middle" font-size="28" font-family="sans-serif">👥</text>
<text x="550" y="190" text-anchor="middle" font-size="16" font-weight="800" font-family="sans-serif" fill="#2563eb">Human Resource</text>
<text x="550" y="218" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Skills, Knowledge</text>
<rect x="100" y="290" width="260" height="160" rx="16" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
<text x="230" y="340" text-anchor="middle" font-size="28" font-family="sans-serif">🏭</text>
<text x="230" y="380" text-anchor="middle" font-size="16" font-weight="800" font-family="sans-serif" fill="#ea580c">Man-made Resource</text>
<text x="230" y="408" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Roads, Buildings</text>
<rect x="420" y="290" width="260" height="160" rx="16" fill="#f3e8ff" stroke="#9333ea" stroke-width="2.5"/>
<text x="550" y="340" text-anchor="middle" font-size="28" font-family="sans-serif">🐟</text>
<text x="550" y="380" text-anchor="middle" font-size="16" font-weight="800" font-family="sans-serif" fill="#9333ea">Biotic Resource</text>
<text x="550" y="408" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Plants, Animals</text>
<text x="400" y="55" text-anchor="middle" font-size="26" font-family="sans-serif" font-weight="800" fill="#14532d">Resources</text>

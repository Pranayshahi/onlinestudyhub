<text x="280" y="261" text-anchor="middle" font-size="12" font-weight="700" font-family="sans-serif" fill="#065f46">Protista</text><rect x="385" y="240" width="110" height="32" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>
<text x="440" y="261" text-anchor="middle" font-size="12" font-weight="700" font-family="sans-serif" fill="#065f46">Fungi</text><rect x="525" y="240" width="110" height="32" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>

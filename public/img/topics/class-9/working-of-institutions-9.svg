<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="20"/>
  <!-- Three pillars -->

<rect x="80" y="105" width="210" height="265" rx="14" fill="#7c3aed11" stroke="#7c3aed" stroke-width="2.5"/>
<rect x="80" y="90" width="210" height="25" rx="8" fill="#7c3aed"/>
<text x="185" y="108" text-anchor="middle" font-size="13" font-weight="900" font-family="sans-serif" fill="#fff">Legislature</text>
<text x="185" y="148" text-anchor="middle" font-size="13" font-weight="700" font-family="sans-serif" fill="#7c3aed">Makes laws</text>
<text x="185" y="180" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#374151">Parliament</text>
<text x="185" y="215" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">Lok Sabha+Rajya Sabha</text>
<rect x="300" y="105" width="210" height="265" rx="14" fill="#ec489911" stroke="#ec4899" stroke-width="2.5"/>
<rect x="300" y="90" width="210" height="25" rx="8" fill="#ec4899"/>
<text x="405" y="108" text-anchor="middle" font-size="13" font-weight="900" font-family="sans-serif" fill="#fff">Executive</text>
<text x="405" y="148" text-anchor="middle" font-size="13" font-weight="700" font-family="sans-serif" fill="#ec4899">Implements laws</text>
<text x="405" y="180" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#374151">President/PM</text>
<text x="405" y="215" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">Cabinet responsible to Parliament</text>
<rect x="520" y="105" width="210" height="265" rx="14" fill="#0284c711" stroke="#0284c7" stroke-width="2.5"/>
<rect x="520" y="90" width="210" height="25" rx="8" fill="#0284c7"/>
<text x="625" y="108" text-anchor="middle" font-size="13" font-weight="900" font-family="sans-serif" fill="#fff">Judiciary</text>
<text x="625" y="148" text-anchor="middle" font-size="13" font-weight="700" font-family="sans-serif" fill="#0284c7">Interprets laws</text>
<text x="625" y="180" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#374151">Supreme Court</text>
<text x="625" y="215" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">Independent &amp; impartial</text>
<text x="400" y="390" text-anchor="middle" font-size="22" font-family="sans-serif" font-weight="800" fill="#581c87">Working of Institutions</text>

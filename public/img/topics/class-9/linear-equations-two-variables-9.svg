<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="20"/>
  <!-- Grid -->
<line x1="140" y1="60" x2="140" y2="360" stroke="#d1fae5" stroke-width="1.2"/><line x1="220" y1="60" x2="220" y2="360" stroke="#d1fae5" stroke-width="1.2"/><line x1="300" y1="60" x2="300" y2="360" stroke="#d1fae5" stroke-width="1.2"/><line x1="380" y1="60" x2="380" y2="360" stroke="#d1fae5" stroke-width="1.2"/><line x1="460" y1="60" x2="460" y2="360" stroke="#d1fae5" stroke-width="1.2"/><line x1="540" y1="60" x2="540" y2="360" stroke="#d1fae5" stroke-width="1.2"/><line x1="620" y1="60" x2="620" y2="360" stroke="#d1fae5" stroke-width="1.2"/>
<line x1="100" y1="80" x2="720" y2="80" stroke="#d1fae5" stroke-width="1.2"/><line x1="100" y1="150" x2="720" y2="150" stroke="#d1fae5" stroke-width="1.2"/><line x1="100" y1="220" x2="720" y2="220" stroke="#d1fae5" stroke-width="1.2"/><line x1="100" y1="290" x2="720" y2="290" stroke="#d1fae5" stroke-width="1.2"/><line x1="100" y1="360" x2="720" y2="360" stroke="#d1fae5" stroke-width="1.2"/>
<!-- Axes -->
<line x1="100" y1="220" x2="720" y2="220" stroke="#374151" stroke-width="2.5"/>
<line x1="400" y1="60" x2="400" y2="360" stroke="#374151" stroke-width="2.5"/>
<!-- Line 1: 2x + y = 4 -->
<line x1="140" y1="300" x2="680" y2="60" stroke="#16a34a" stroke-width="3"/>
<text x="695" y="68" font-size="13" font-weight="700" font-family="sans-serif" fill="#15803d">2x+y=4</text>
<!-- Line 2: x − y = −1 -->
<line x1="140" y1="150" x2="680" y2="300" stroke="#dc2626" stroke-width="3"/>
<text x="695" y="308" font-size="13" font-weight="700" font-family="sans-serif" fill="#dc2626">x−y=−1</text>
<!-- Intersection point -->
<circle cx="340" cy="178" r="9" fill="#7c3aed"/>
<text x="320" y="162" text-anchor="middle" font-size="13" font-weight="700" font-family="sans-serif" fill="#5b21b6">Solution</text>
<text x="400" y="385" text-anchor="middle" font-size="22" font-family="sans-serif" font-weight="800" fill="#14532d">Linear Equations in Two Variables</text>
</svg>
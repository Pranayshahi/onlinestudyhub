<line x1="535" y1="225" x2="570" y2="260" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/><line x1="535" y1="210" x2="570" y2="210" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/><line x1="535" y1="195" x2="570" y2="160" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/><line x1="505" y1="225" x2="470" y2="260" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/><line x1="505" y1="210" x2="470" y2="210" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/><line x1="505" y1="195" x2="470" y2="160" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>

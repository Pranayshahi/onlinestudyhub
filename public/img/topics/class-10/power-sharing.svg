<text x="235" y="168" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#374151">Legislature · Executive · Judiciary</text>
<text x="235" y="202" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#2563eb">Balance of power</text>
<rect x="430" y="90" width="310" height="148" rx="16" fill="#16a34a11" stroke="#16a34a" stroke-width="2.5"/>
<text x="585" y="128" text-anchor="middle" font-size="14" font-weight="900" font-family="sans-serif" fill="#16a34a">Vertical Sharing</text>
<text x="585" y="168" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#374151">Centre · State · Local self-govt</text>
<text x="585" y="202" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#16a34a">Balance of power</text>
<rect x="80" y="265" width="310" height="148" rx="16" fill="#f9731611" stroke="#f97316" stroke-width="2.5"/>
<text x="235" y="303" text-anchor="middle" font-size="14" font-weight="900" font-family="sans-serif" fill="#f97316">Community Sharing</text>
<text x="235" y="343" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#374151">Religious · Linguistic groups</text>
<text x="235" y="377" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#f97316">Balance of power</text>
<rect x="430" y="265" width="310" height="148" rx="16" fill="#9333ea11" stroke="#9333ea" stroke-width="2.5"/>
<text x="585" y="303" text-anchor="middle" font-size="14" font-weight="900" font-family="sans-serif" fill="#9333ea">Political Sharing</text>
<text x="585" y="343" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#374151">Parties · Pressure groups · Media</text>

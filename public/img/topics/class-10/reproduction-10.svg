<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="20"/>
  
<rect x="80" y="90" width="210" height="148" rx="16" fill="#dc262612" stroke="#dc2626" stroke-width="2"/>
<text x="185" y="125" text-anchor="middle" font-size="14" font-weight="800" font-family="sans-serif" fill="#dc2626">Fission</text>
<text x="185" y="155" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Single cell splits in two</text>
<text x="185" y="180" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#dc2626">Amoeba, Bacteria</text>
<rect x="310" y="90" width="210" height="148" rx="16" fill="#f9731612" stroke="#f97316" stroke-width="2"/>
<text x="415" y="125" text-anchor="middle" font-size="14" font-weight="800" font-family="sans-serif" fill="#f97316">Budding</text>
<text x="415" y="155" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">New organism from bud</text>
<text x="415" y="180" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#f97316">Hydra, Yeast</text>
<rect x="540" y="90" width="210" height="148" rx="16" fill="#16a34a12" stroke="#16a34a" stroke-width="2"/>
<text x="645" y="125" text-anchor="middle" font-size="14" font-weight="800" font-family="sans-serif" fill="#16a34a">Fragmentation</text>
<text x="645" y="155" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Break → new organism</text>
<text x="645" y="180" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#16a34a">Spirogyra</text>
<rect x="80" y="270" width="210" height="148" rx="16" fill="#9333ea12" stroke="#9333ea" stroke-width="2"/>
<text x="185" y="305" text-anchor="middle" font-size="14" font-weight="800" font-family="sans-serif" fill="#9333ea">Sexual Reprod.</text>
<text x="185" y="335" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Male + Female gametes</text>
<text x="185" y="360" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#9333ea">Flowers, Animals</text>
<rect x="310" y="270" width="210" height="148" rx="16" fill="#ca8a0412" stroke="#ca8a04" stroke-width="2"/>
<text x="415" y="305" text-anchor="middle" font-size="14" font-weight="800" font-family="sans-serif" fill="#ca8a04">Pollination</text>
<text x="415" y="335" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Pollen to stigma</text>
<text x="415" y="360" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#ca8a04">Cross/Self pollination</text>
<rect x="540" y="270" width="210" height="148" rx="16" fill="#0284c712" stroke="#0284c7" stroke-width="2"/>
<text x="645" y="305" text-anchor="middle" font-size="14" font-weight="800" font-family="sans-serif" fill="#0284c7">Fertilisation</text>
<text x="645" y="335" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">Sperm + Egg → Zygote</text>
<text x="645" y="360" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#0284c7">External/Internal</text>
<text x="400" y="65" text-anchor="middle" font-size="24" font-family="sans-serif" font-weight="800" fill="#831843">How do Organisms Reproduce?</text>
</svg>
version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "5001:5001"
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=osh_password
      - DB_NAME=onlinestudyhub
    stdin_open: true
    tty: true

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # SSL certs mount
    depends_on:
      - app

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: osh_password
      MYSQL_DATABASE: onlinestudyhub
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/init.sql

  tester:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - BASE_URL=http://app:3000
    depends_on:
      - app
    command: >
      sh -c "npm install &&
             npx playwright install --with-deps chromium &&
             npx playwright test --reporter=html"
    profiles:
      - testing

volumes:
  db_data:
